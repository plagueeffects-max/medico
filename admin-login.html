<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medico Group | Admin Login</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;800;900&family=Space+Grotesk:wght@300;500;700;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="assets/css/style.css">

    <style>
        body {
            background: var(--bg-grey);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .login-card {
            background: #ffffff;
            padding: 50px 40px;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 450px;
            text-align: center;
            border: 1px solid var(--border-light);
        }

        .login-brand {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--text-dark);
            margin-bottom: 10px;
        }
        .login-brand span {
            color: var(--accent-red);
        }

        .login-subtitle {
            color: var(--text-muted);
            margin-bottom: 40px;
            font-size: 1rem;
        }

        .form-group {
            margin-bottom: 25px;
            text-align: left;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-dark);
        }

        .form-control {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            transition: var(--transition-fast);
            background: #f9fafb;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--text-dark);
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(0,0,0,0.05);
        }

        .login-btn-submit {
            width: 100%;
            background: var(--text-dark);
            color: #ffffff;
            border: none;
            padding: 16px;
            border-radius: 8px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition-fast);
            margin-top: 10px;
        }

        .login-btn-submit:hover {
            background: var(--accent-red);
            box-shadow: 0 10px 20px var(--accent-glow);
            transform: translateY(-2px);
        }

        .error-msg {
            color: var(--accent-red);
            font-size: 0.9rem;
            margin-top: 15px;
            display: none;
            font-weight: 500;
        }

        .back-home {
            display: inline-block;
            margin-top: 30px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: var(--transition-fast);
        }
        .back-home:hover {
            color: var(--text-dark);
        }
    </style>
</head>
<body>

    <div class="login-card reveal active">
        <a href="index.html" class="login-brand" style="text-decoration:none; color:inherit; display:block;">Medico<span>.</span></a>
        <div class="login-subtitle">Admin Portal Access</div>

        <form id="loginForm">
            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <input type="email" id="email" class="form-control" placeholder="Enter admin email" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" class="form-control" placeholder="Enter password" required>
            </div>
            
            <div id="errorMsg" class="error-msg">Invalid email or password.</div>

            <button type="submit" class="login-btn-submit">Sign In</button>
        </form>

        <a href="index.html" class="back-home">← Back to Website</a>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            const submitBtn = document.querySelector('.login-btn-submit');
            
            submitBtn.textContent = 'Verifying...';
            submitBtn.disabled = true;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    // Set session token
                    sessionStorage.setItem('medico_admin_auth', data.token || 'true');
                    window.location.href = 'admin-dashboard.html';
                } else {
                    errorMsg.textContent = data.message || 'Invalid email or password.';
                    errorMsg.style.display = 'block';
                    submitBtn.textContent = 'Sign In';
                    submitBtn.disabled = false;
                }
            } catch (err) {
                console.error(err);
                errorMsg.textContent = 'Server offline. Cannot verify credentials.';
                errorMsg.style.display = 'block';
                submitBtn.textContent = 'Sign In';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
